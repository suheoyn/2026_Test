	<body>
		<h1><개강></hi>
		<p>기: 오늘은 개강날이다. 나는 아침에 일어나서 준비를 했다.</p>
		<p>승: 씻고 나와 옷을 입고 짐을 챙겼더니 벌써 40분이나 지났다. 첫날이라 화장하고 갈랬는데 어쩔 수 없다.</p>
		<p>전: 나는 화장도 못하고 어서 빨리 집에서 나왔다. 엘레베이터는 공사중이서 계단으로 뛰어내려왔다. 근데 시간 맞춰 와야 할 버스가 너무 안 와서 시간을 보니, 10분 뒤 도착이라고 나와 있었다. 그러고 날짜를 보니 오늘은 일요일이었다.</p>
		<p>결: 그렇다. 오늘은 개강 전 날이었다.</p>
